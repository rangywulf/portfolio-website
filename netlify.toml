# WordPress leftovers
[[redirects]]
  from = "/wp-admin/*"
  to = "/403.html"
  status = 403

[[redirects]]
  from = "/wp-includes/*"
  to = "/403.html"
  status = 403

[[redirects]]
  from = "/wp-login.php"
  to = "/403.html"
  status = 403

[[redirects]]
  from = "/xmlrpc.php"
  to = "/403.html"
  status = 403

[[redirects]]
  from = "/wlwmanifest.xml"
  to = "/403.html"
  status = 403

[[redirects]]
